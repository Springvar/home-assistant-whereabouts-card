persons:
  - entity_id: person.jane
    name: Jane Doe
    namedSensors:
      activity:
        entity_id: sensor.jane_activity
  - entity_id: person.john
    name: John Smith
    namedSensors:
      activity:
        entity_id: sensor.john_activity
  - entity_id: person.jim
    name: Jim Incognito
    namedSensors:
      visibility:
        entity_id: sensor.jim_visibility
    hideIf:
      visibility: "hidden"
show_title: true
title: Whereabouts Test
default_activity: is
default_preposition: at
activities:
  - activity: "is working"
    location_override: "-"
    show_preposition: false
    icon: "mdi:briefcase"
    conditions:
      activity: "working"
      where: "work"
  - activity: "is gaming"
    show_preposition: true
    icon: "mdi:gamepad"
    conditions:
      activity: "gaming"
      where: "home"
zone_groups:
  - name: "work"
    zones: ["zone.office", "zone.laboratory"]
    show_preposition: true
    icon: "mdi:office-building"
  - name: "home"
    zones: ["zone.home"]
    preposition: "at"
    show_preposition: false
    icon: "mdi:home"
