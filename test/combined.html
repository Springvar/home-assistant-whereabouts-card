<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Whereabouts Card + Editor Demo</title>
        <script type="module" src="/src/whereabouts-card.ts"></script>
        <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
        <script>
            // Simple ha-icon polyfill using inline SVG
            class HaIcon extends HTMLElement {
                static get observedAttributes() {
                    return ['icon'];
                }

                connectedCallback() {
                    this.style.display = 'inline-flex';
                    this.style.alignItems = 'center';
                    this.style.justifyContent = 'center';
                    this.render();
                }

                attributeChangedCallback() {
                    this.render();
                }

                async render() {
                    const icon = this.getAttribute('icon');
                    if (icon && icon.startsWith('mdi:')) {
                        const iconName = icon.replace('mdi:', '');
                        const computedStyle = window.getComputedStyle(this);
                        const size = computedStyle.getPropertyValue('--mdc-icon-size').trim() || '24px';
                        const color = computedStyle.color || 'currentColor';

                        // Fetch SVG from Iconify API
                        try {
                            const response = await fetch(`https://api.iconify.design/mdi/${iconName}.svg?color=${encodeURIComponent(color)}&width=${size}&height=${size}`);
                            if (response.ok) {
                                const svg = await response.text();
                                this.innerHTML = svg;
                            } else {
                                // Fallback to emoji
                                this.innerHTML = `<span style="font-size: ${size};">❓</span>`;
                            }
                        } catch (e) {
                            this.innerHTML = `<span style="font-size: ${size};">❓</span>`;
                        }
                    }
                }
            }

            if (!customElements.get('ha-icon')) {
                customElements.define('ha-icon', HaIcon);
            }
        </script>
        <style>
            :root {
                --primary-color: #03a9f4;
                --accent-color: #ff9800;
                --primary-background-color: #fafafa;
                --secondary-background-color: #e0e0e0;
                --ha-card-background: #fff;
                --ha-card-box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.12);
                --primary-text-color: #212121;
                --secondary-text-color: #757575;
                --info-color: #2196f3;
                --success-color: #43a047;
                --warning-color: #fb8c00;
                --error-color: #c0392b;
            }
            body {
                background: #fafafa;
                font-family: sans-serif;
                margin: 0;
                padding: 2em;
            }
            .container {
                display: flex;
                gap: 2em;
                max-width: 1400px;
                margin: 0 auto;
                align-items: flex-start;
            }
            .editor-column {
                flex: 1 1 460px;
                min-width: 400px;
                max-width: 460px;
            }
            .preview-column {
                flex: 0 1 400px;
                min-width: 300px;
                position: sticky;
                top: 2em;
            }
            h2 {
                color: var(--primary-text-color);
                margin-top: 0;
                margin-bottom: 1em;
            }
            whereabouts-card-editor {
                display: block;
            }
            whereabouts-card {
                display: block;
            }
            @media (max-width: 900px) {
                .container {
                    flex-direction: column;
                }
                .preview-column {
                    position: static;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="editor-column">
                <h2>Editor</h2>
                <whereabouts-card-editor id="whereaboutseditor"></whereabouts-card-editor>
            </div>

            <div class="preview-column">
                <h2>Card Preview</h2>
                <whereabouts-card id="whereaboutscard"></whereabouts-card>
            </div>
        </div>

                            latitude: 63.4100,

                        }
                    },

                        }

                            friendly_name: 'Joey Doe',

                        }

                            latitude: 63.4305,
                            longitude: 10.3951,

                    'zone.school': {

                            latitude: 63.4200,

                            latitude: 63.4150,
                            longitude: 10.4100,

                            latitude: 63.4041,

                        }

                            friendly_name: 'Electronics Store',
                            latitude: 63.4080,
                            longitude: 10.4220,
                            radius: 50
                        }
                    },
                    'binary_sensor.joey_in_doghouse': {
                        state: 'on',

                            friendly_name: 'Joey in Dog House'
                        }
                    },
                    'sensor.john_detected_activity': {
                        state: 'still',

                        }
                    },
                    'sensor.jane_detected_activity': {
                        state: 'driving',
                        attributes: {
                            friendly_name: 'Jane Detected Activity'
                        }
                    },
                    'sensor.jimmy_detected_activity': {
                        state: 'sleeping',
                        attributes: {
                            friendly_name: 'Jimmy Detected Activity'
                        }
                    },
                    'sensor.jenny_detected_activity': {
                        state: 'running',
                        attributes: {
                            friendly_name: 'Jenny Detected Activity'
                        }
                    }
                }
            };

            const cardConfig = {
                type: 'custom:whereabouts-card',
                persons: [
                    {
                        entity_id: 'person.john_doe',
                        namedSensors: {
                            detected_activity: { entity_id: 'sensor.john_detected_activity' }
                        }
                    },
                    {
                        entity_id: 'person.jane_doe',
                        namedSensors: {
                            detected_activity: { entity_id: 'sensor.jane_detected_activity' }
                        }
                    },
                    {
                        entity_id: 'person.jimmy_doe',
                        namedSensors: {

                        }
                    },
                    {
                        entity_id: 'person.jenny_doe',
                        namedSensors: {
                            detected_activity: { entity_id: 'sensor.jenny_detected_activity' }
                        }
                    },
                    {
                        entity_id: 'person.joey_doe',
                        name: 'Doeg',
                        namedSensors: {
                            in_doghouse: { entity_id: 'binary_sensor.joey_in_doghouse' }
                        }
                    }
                ],
                show_title: true,
                title: 'The Doe Family',
                show_avatars: true,
                default_activity: 'is',
                default_preposition: 'at',
                zone_groups: [
                    { name: 'home', zones: ['zone.home'], show_preposition: false, icon: 'mdi:home' },
                    { zones: ['zone.school'], preposition: 'at', icon: 'mdi:school' },
                    {
                        zones: ['zone.office', 'zone.gym'],
                        preposition: 'at the',
                        activities: [
                            {
                                activity: 'working',
                                icon: 'mdi:laptop',
                                show_location: true,
                                conditions: {
                                    where: 'zone.office',
                                    detected_activity: 'still'
                                }
                            }
                        ]
                    },
                    {
                        name: 'the store',
                        zones: ['zone.grocery_store', 'zone.hardware_store', 'zone.electronics_store'],
                        preposition: 'at',
                        icon: 'mdi:shopping',
                        activities: [
                            {
                                activity: 'is parking',
                                icon: 'mdi:car',
                                show_location: true,
                                conditions: {
                                    detected_activity: 'driving'
                                }
                            },
                            {
                                activity: 'is shopping',
                                icon: 'mdi:cart',
                                show_location: true,
                                conditions: {}
                            }
                        ]
                    },
                    { zones: ['zone.doghouse'], preposition: 'near the' }
                ],
                activities: [
                    {
                        activity: 'is sleeping',
                        conditions: {
                            who: 'person.joey_doe',
                            in_doghouse: 'on'
                        },
                        location_override: 'the dog house',
                        show_location: true,
                        preposition: 'in',
                        icon: 'mdi:sleep'
                    },
                    {
                        activity: 'is working out',
                        conditions: {
                            where: 'gym',
                            detected_activity: 'running'
                        },
                        icon: 'mdi:dumbbell'
                    }
                ],
                template: '{name} {activity} {-preposition} {-location} <right {icon}>'
            };

            async function initComponents() {
                try {
                    await window.customElements.whenDefined('whereabouts-card');
                    await window.customElements.whenDefined('whereabouts-card-editor');

                    const card = document.getElementById('whereaboutscard');
                    const editor = document.getElementById('whereaboutseditor');

                    // Initialize card
                    card.setConfig(cardConfig);
                    card.hass = dummyHass;

                    // Initialize editor
                    editor.hass = dummyHass;
                    if (editor.setConfig) {
                        editor.setConfig(cardConfig);
                    }

                    // Listen for config changes from editor
                    editor.addEventListener('config-changed', (event) => {
                        console.log('Config changed:', event.detail.config);
                        card.setConfig(event.detail.config);
                        card.requestUpdate();
                    });

                    console.log('Card and editor initialized with config:', cardConfig);
                } catch (e) {
                    console.error("Error initializing components:", e);
                    document.getElementById('whereaboutscard').innerHTML =
                        `<div style="padding: 20px; color: red;">Error: ${e.message}</div>`;
                }
            }

            initComponents();
        </script>
    </body>
</html>
